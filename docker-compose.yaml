version: '3.8'
services:
  go2rtc:
    container_name: go2rtc
    image: alexxit/go2rtc:latest
    restart: always
    ports:
      - "1984:1984" # API & Web UI
      - "8554:8554" # RTSP
      - "8555:8555/tcp" # WebRTC TCP
      - "8555:8555/udp" # WebRTC UDP
    privileged: true
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./config:/config  # 挂载配置文件路径